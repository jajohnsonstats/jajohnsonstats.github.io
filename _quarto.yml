project:
  type: website
  output-dir: docs
  pre-render:
    - wsl bash files/resources/update_cv.sh
    - python files/publications/bib_to_yml.py
    - python files/publications/merge_pubs.py

author-meta: "Jacob Johnson"
description-meta: "Jacob Johnson: Statistician and PhD student at UW–Madison"

website:
  title: "Jacob Johnson"
  image: "files/images/JacobJohnson.JPG"
  description: "Jacob Johnson: Statistician and PhD student at UW–Madison"
 
  navbar:
    background: light  

    left:  
      - text: About
        href: about.qmd
      - text: Research
        menu:
          - text: Publications  # Automatically generated from publications.bib
            href: publications.qmd
          - text: Presentations
            href: presentations.qmd
          - text: Projects
            href: projects.qmd   
      - text: Contact
        href: contact.qmd  
  
    right: 
      - text: CV
        href: files/CV/JacobJohnsonCV.pdf
      - icon: github
        href: https://github.com/jajohnsonstats
        target: _blank

  page-navigation: true
  
  page-footer: 
    left: "[Jacob Johnson](https://github.com/jajohnsonstats/jajohnsonstats.github.io) &copy; <script>document.write(new Date().getFullYear())</script>" 
    center: "Build on [Quarto Academic Website Template](https://github.com/drganghe/quarto-academic-website-template) adapted by [Dr. Gang He](http://drganghe.github.io)"
    right:  
      - icon: github
        href: https://github.com/jajohnsonstats/jajohnsonstats.github.io
        target: _blank

  search:
    location: navbar
    type: textbox
  
  reader-mode: false  

  draft-mode: unlinked 
  
  repo-url: https://github.com/jajohnsonstats/jajohnsonstats.github.io
  #repo-actions: [edit, issue, source]
  
  open-graph: true
  
  twitter-card:  
    card-style: summary      
  
  site-url: "https://jajohnsonstats.github.io/"
  
  google-analytics:
    tracking-id: "G-GQ3XLM3KLT" 
    anonymize-ip: true 

format:
  html:
    theme: cosmo
    css:
      - files/resources/styles.css
      - files/resources/custom.css
      - files/resources/codebtn.html
      - files/resources/githubbtn.html
      - files/resources/pdfbtn.html
    toc: true
    footnotes-hover: true
    code-copy: true
    code-link: true
    code-overflow: wrap
    fig-align: center
    link-external-icon: false
    link-external-newwindow: true
    email-obfuscation: javascript
    include-in-header: "files/includes/_academic.qmd"

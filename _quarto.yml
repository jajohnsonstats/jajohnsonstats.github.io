project:
  type: website
  output-dir: docs
  pre-render:  # This can be deleted if you are using the manually curated list of publications in publications.qmd
    - python xlsx_to_yml.py  # Automatically generate publications.yml from publications.xlsx
    
# Meta
description-meta: "Personal Academic Website for Jacob Johnson"
author-meta: "Jacob Johnson"

website:
  title: "Jacob Johnson"
  image: "docs/files/images/JacobJohnson.JPG"
  description: "Personal Academic Website for Jacob Johnson"
 
  navbar:
    background: light  # You can change the background color here

    left:  
      - text: About
        href: posts.qmd#category=news
      - text: Research
        menu:
          - text: Publications Listing  # Automatically generated from publications.xlsx
            href: pub-listing.qmd
          - text: Presentations
            href: posts.qmd#category=presentation  
          - text: Projects
            href: projects.qmd   
      - text: Contact
        href: contact.qmd  
  
        
    right: 
      - text: CV
        href: files/JacobJohnsonCV.pdf
      - icon: github
        href: https://github.com/jajohnsonstats
        target: _blank

  page-navigation: true
  
  page-footer: 
    left: "[Jacob Johnson](http://www.github.com) &copy; <script>document.write(new Date().getFullYear())</script>" 
    center: "Build on [Quarto Academic Website Template](https://github.com/drganghe/quarto-academic-website-template) adapted by [Dr. Gang He](http://drganghe.github.io)"
    right:  
      - icon: github
        href: https://github.com/jajohnsonstats
        target: _blank

  search:
    location: navbar
    type: textbox
  
  reader-mode: true

  draft-mode: unlinked
  
  repo-url: https://github.com/drganghe/quarto-academic-website-template
#  repo-actions: [edit, issue, source]
  
  open-graph: true
  
  twitter-card: true 
#  card-style: summary      
  
  site-url: "https://drganghe.github.io/quarto-academic-website-template"
  
  google-analytics:
    tracking-id: "G-GQ3XLM3KLT"  # Please delete or replace with your own tracking ID
    anonymize-ip: true 

bibliography: references.bib  # Add references.bib to the root folder to enable the bibliography function

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    footnotes-hover: true
    code-copy: true
    code-link: true
    code-overflow: wrap
    fig-align: center
    link-external-icon: false
    link-external-newwindow: true
    email-obfuscation: javascript
    link-external-filter: '^(?:http:|https:)\/\/drganghe\.github\.io\/custom'
    include-in-header: "files/includes/_academic.qmd"

